name: Update analytics report

# Pulls post performance (likes, comments, reach/shares) for everything already
# published into data/report.json, which the dashboard and docs/report.html show
# as a shareable client report. Runs weekly and on demand. Read-only against the
# platforms; never touches tokens.

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: analytics-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build the analytics report
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python -m src.report

      - name: Commit the refreshed report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/report.json
          if ! git diff --cached --quiet; then
            git commit -m "Update analytics report [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME" || true
            git push
          fi

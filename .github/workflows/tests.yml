name: Tests

on:
  push:
    branches: ["claude/account-setup-config-569zpw"]
    paths-ignore:
      - "data/**"
      - "content/**"
      - "docs/uploads/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest

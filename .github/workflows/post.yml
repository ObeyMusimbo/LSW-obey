name: Publish business posts

on:
  schedule:
    # Monday, Wednesday, Friday at 09:00 UTC — edit to taste (crontab.guru)
    - cron: "0 9 * * 1,3,5"
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow id from data/flows.json (blank = standard post)"
        required: false
        default: ""
      platforms:
        description: "Comma-separated platforms, e.g. instagram,telegram (blank = all configured)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: publish-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          FLOW: ${{ github.event.inputs.flow }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          args=""
          [ -n "$FLOW" ] && args="$args --flow $FLOW"
          [ -n "$PLATFORMS" ] && args="$args --platforms $PLATFORMS"
          echo "Running: python -m src.main post $args"
          python -m src.main post $args

      - name: Commit updated post history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if ! git diff --cached --quiet; then
            git commit -m "Record published posts [skip ci]"
            git push
          fi
